<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </radialGradient>
    <!-- Skin gradient -->
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3e8"/>
      <stop offset="100%" stop-color="#fde4cc"/>
    </linearGradient>
    <!-- Hair gradient -->
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a3825"/>
      <stop offset="100%" stop-color="#3d2618"/>
    </linearGradient>
    <!-- Coat gradient -->
    <linearGradient id="coatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <!-- Eye shine -->
    <radialGradient id="eyeGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="60%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>

  <!-- Subtle sparkles in background -->
  <circle cx="35" cy="40" r="2" fill="white" opacity="0.7"/>
  <circle cx="170" cy="55" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="160" cy="130" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="28" cy="120" r="1.8" fill="white" opacity="0.6"/>

  <!-- Body / shoulders (white coat) -->
  <path d="M 35 200 Q 35 155 70 145 L 130 145 Q 165 155 165 200 Z"
        fill="url(#coatGrad)" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Coat lapel V-neck -->
  <path d="M 85 145 L 100 170 L 115 145 Z" fill="#0f4c81"/>
  <!-- Coat collar -->
  <path d="M 70 145 L 85 145 L 100 168 L 115 145 L 130 145 L 122 158 L 100 180 L 78 158 Z"
        fill="white" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Stethoscope tubing -->
  <path d="M 78 152 Q 60 175 70 195" stroke="#1f2937" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 122 152 Q 140 175 130 195" stroke="#1f2937" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Stethoscope chest piece -->
  <circle cx="100" cy="195" r="9" fill="#94a3b8" stroke="#475569" stroke-width="1.5"/>
  <circle cx="100" cy="195" r="5" fill="#cbd5e1"/>

  <!-- Neck -->
  <rect x="92" y="125" width="16" height="22" rx="6" fill="url(#skinGrad)"/>
  <!-- Neck shadow -->
  <ellipse cx="100" cy="143" rx="11" ry="3" fill="#fbcfa3" opacity="0.5"/>

  <!-- ====== HAIR BACK ====== -->
  <path d="M 100 30
           Q 50 30 45 90
           Q 42 130 60 150
           L 70 145
           Q 60 110 70 75
           Q 80 55 100 50
           Q 120 55 130 75
           Q 140 110 130 145
           L 140 150
           Q 158 130 155 90
           Q 150 30 100 30 Z"
        fill="url(#hairGrad)"/>

  <!-- Face -->
  <ellipse cx="100" cy="92" rx="34" ry="40" fill="url(#skinGrad)"/>

  <!-- ====== HAIR FRONT (bangs) ====== -->
  <path d="M 65 75
           Q 70 50 100 48
           Q 130 50 135 75
           Q 130 70 122 72
           Q 115 68 105 75
           Q 100 78 95 75
           Q 85 68 78 72
           Q 70 70 65 75 Z"
        fill="url(#hairGrad)"/>

  <!-- Side hair locks -->
  <path d="M 66 80 Q 60 105 68 130 L 76 128 Q 72 105 76 82 Z" fill="url(#hairGrad)"/>
  <path d="M 134 80 Q 140 105 132 130 L 124 128 Q 128 105 124 82 Z" fill="url(#hairGrad)"/>

  <!-- ====== EYES (big anime style) ====== -->
  <!-- Left eye -->
  <ellipse cx="85" cy="95" rx="7" ry="10" fill="white" stroke="#1f2937" stroke-width="1.2"/>
  <ellipse cx="85" cy="96" rx="5.5" ry="8.5" fill="url(#eyeGrad)"/>
  <circle cx="83" cy="92" r="2.2" fill="white"/>
  <circle cx="86.5" cy="99" r="1" fill="white"/>
  <!-- Eyelashes -->
  <path d="M 78 88 Q 80 87 82 88.5" stroke="#1f2937" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M 90 87.5 Q 92 86.5 93 88" stroke="#1f2937" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- Right eye -->
  <ellipse cx="115" cy="95" rx="7" ry="10" fill="white" stroke="#1f2937" stroke-width="1.2"/>
  <ellipse cx="115" cy="96" rx="5.5" ry="8.5" fill="url(#eyeGrad)"/>
  <circle cx="113" cy="92" r="2.2" fill="white"/>
  <circle cx="116.5" cy="99" r="1" fill="white"/>
  <!-- Eyelashes -->
  <path d="M 107 87.5 Q 108 86.5 110 88" stroke="#1f2937" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M 118 88.5 Q 120 87 122 88" stroke="#1f2937" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows -->
  <path d="M 78 82 Q 85 79 92 82" stroke="#3d2618" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 108 82 Q 115 79 122 82" stroke="#3d2618" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="74" cy="110" rx="6" ry="3" fill="#fda4af" opacity="0.55"/>
  <ellipse cx="126" cy="110" rx="6" ry="3" fill="#fda4af" opacity="0.55"/>

  <!-- Tiny nose -->
  <path d="M 100 106 Q 99 109 100 110 Q 101 109 100 106" fill="#fbcfa3" stroke="#e8a96f" stroke-width="0.5"/>

  <!-- Cute smile -->
  <path d="M 92 119 Q 100 125 108 119" stroke="#dc2626" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Tiny tongue/mouth fill -->
  <path d="M 95 121 Q 100 124 105 121 Q 100 122 95 121" fill="#fca5a5"/>

  <!-- Medical Cross on coat collar -->
  <g transform="translate(100,175)">
    <circle r="7" fill="#dc2626"/>
    <rect x="-1.5" y="-4.5" width="3" height="9" fill="white"/>
    <rect x="-4.5" y="-1.5" width="9" height="3" fill="white"/>
  </g>

  <!-- Headband / medical cap accent -->
  <path d="M 70 60 Q 100 50 130 60" stroke="#0f4c81" stroke-width="3" fill="none" stroke-linecap="round" opacity="0"/>
</svg>
